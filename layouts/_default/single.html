{{ define "main" }}
<article class="page-content">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    <nav class="pagination">
      {{ with .PrevInSection }}
      <a href="{{ .Permalink }}" class="prev">Anterior: {{ .Title }}</a>
      {{ end }} {{ with .NextInSection }}
      <a href="{{ .Permalink }}" class="next">Siguiente: {{ .Title }}</a>
      {{ end }}
    </nav>
  </div>
</article>
{{ end }}
